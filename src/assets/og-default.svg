<?xml version="1.0" encoding="UTF-8"?>
<!--
  og-default.svg — editable source for the fallback social-share image.

  This SVG is the DESIGN source of truth. It is NOT referenced directly as
  og:image (social crawlers don't render SVG). Instead, scripts/generate-og.mjs
  rasterizes it to public/og-default.png at 1200x630 — the canonical OG size.

  Edit colors/text here, then run `npm run og` (or any build) to regenerate.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Accent bar -->
  <rect x="80" y="250" width="64" height="8" rx="4" fill="#60a5fa" />

  <!-- Brand name -->
  <text x="80" y="340" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">
    Acme Home Services
  </text>

  <!-- Tagline -->
  <text x="80" y="410" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#cbd5e1">
    Plumbing · HVAC · Electrical · Drain · Insulation
  </text>

  <!-- Footer / domain -->
  <text x="80" y="540" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#93c5fd">
    seo-starter-site.vercel.app
  </text>
</svg>
